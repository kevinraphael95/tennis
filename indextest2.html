<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mario Tennis Ultra Smash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Arial Black',Arial,sans-serif;}
canvas{display:block;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* MENU */
#menu{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:all;
  background:linear-gradient(170deg,#12005e 0%,#1a0080 20%,#003a9e 50%,#004a15 80%,#001a08 100%);
  overflow:hidden;
}
#menu-bg-glow{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 50% 35%,rgba(255,200,0,.18) 0%,transparent 70%);
}
.star-field{position:absolute;inset:0;pointer-events:none;}
.star-dot{position:absolute;border-radius:50%;background:#fff;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{0%{opacity:.15;transform:scale(1);}100%{opacity:1;transform:scale(1.4);}}

#logo-wrap{position:relative;text-align:center;margin-bottom:28px;}
#logo-img{width:min(500px,85vw);filter:drop-shadow(0 4px 24px rgba(255,100,0,.7));}
#logo-sub{color:#FFD700;font-size:clamp(11px,2vw,18px);letter-spacing:8px;margin-top:6px;text-shadow:0 2px 8px rgba(0,0,0,.6);}

/* CHAR SELECT */
.sec-label{color:rgba(255,255,255,.55);font-size:clamp(9px,1.3vw,12px);letter-spacing:3px;margin-bottom:10px;text-align:center;}
.char-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:22px;}
.char-card{
  width:clamp(68px,9.5vw,100px);padding:10px 8px 8px;
  border:2px solid rgba(255,255,255,.18);border-radius:14px;
  cursor:pointer;text-align:center;background:rgba(0,0,40,.55);
  transition:all .18s;pointer-events:all;
}
.char-card img{width:clamp(44px,7vw,72px);height:clamp(44px,7vw,72px);object-fit:contain;}
.char-card:hover,.char-card.sel{
  border-color:#FFD700;background:rgba(255,215,0,.22);
  transform:translateY(-5px) scale(1.07);box-shadow:0 8px 22px rgba(255,215,0,.4);
}
.char-name{color:#fff;font-size:clamp(8px,1.1vw,11px);font-weight:900;letter-spacing:.5px;margin-top:4px;}
.char-type{color:#FFD700;font-size:clamp(7px,.9vw,9px);}

/* COURT BTNS */
.court-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;}
.court-btn{
  padding:7px 16px;border:2px solid rgba(255,255,255,.2);border-radius:20px;
  color:rgba(255,255,255,.7);font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(9px,1.4vw,12px);cursor:pointer;
  background:rgba(255,255,255,.06);transition:all .18s;pointer-events:all;
}
.court-btn:hover,.court-btn.sel{border-color:#FFD700;color:#FFD700;background:rgba(255,215,0,.15);}

/* DIFF */
.diff-row{display:flex;gap:8px;margin-bottom:22px;}
.diff-btn{
  padding:7px 20px;border:2px solid rgba(255,255,255,.2);border-radius:20px;
  color:rgba(255,255,255,.6);font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(9px,1.4vw,12px);cursor:pointer;
  background:rgba(255,255,255,.05);transition:all .18s;pointer-events:all;
}
.diff-btn.sel{border-color:#FFD700;color:#FFD700;background:rgba(255,215,0,.15);}

/* BUTTONS */
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.mbtn{
  padding:13px 36px;border:3px solid #FFD700;border-radius:30px;
  color:#fff;font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(13px,2vw,18px);cursor:pointer;pointer-events:all;
  letter-spacing:1px;position:relative;overflow:hidden;transition:transform .1s,filter .1s;
}
.mbtn.red{background:linear-gradient(180deg,#E60026,#8B0000);}
.mbtn.blue{background:linear-gradient(180deg,#0066CC,#003380);}
.mbtn:hover{transform:scale(1.07) translateY(-2px);filter:brightness(1.18);}
.mbtn:active{transform:scale(.97);}

/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;padding:8px 12px;display:none;pointer-events:none;}
#scorebox{
  display:flex;align-items:stretch;gap:0;
  background:rgba(0,0,0,.82);border:2px solid #FFD700;border-radius:18px;
  padding:6px 18px;margin:0 auto;width:fit-content;
}
.s-side{text-align:center;padding:2px 14px;}
.s-name{color:#7FD4FF;font-size:clamp(9px,1.4vw,13px);letter-spacing:1px;}
.s-pts{color:#FFD700;font-size:clamp(20px,3.5vw,36px);font-weight:900;line-height:1.1;}
.s-info{color:#fff;font-size:clamp(8px,1.2vw,11px);}
.s-sets{display:flex;gap:3px;justify-content:center;margin-top:2px;}
.s-pip{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);}
.s-pip.w{background:#FFD700;border-color:#FFD700;}
.s-div{color:#FFD700;font-size:clamp(14px,2vw,24px);font-weight:900;padding:0 10px;display:flex;align-items:center;border-left:1px solid rgba(255,215,0,.3);border-right:1px solid rgba(255,215,0,.3);}

/* POWER BAR */
#pbar-wrap{
  position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  display:none;flex-direction:column;align-items:center;gap:3px;
  background:rgba(0,0,0,.72);border:2px solid rgba(255,255,255,.25);
  border-radius:10px;padding:7px 14px;
}
#pbar-label{color:#FFD700;font-size:10px;letter-spacing:2px;}
#pbar-bg{width:160px;height:13px;background:rgba(255,255,255,.12);border-radius:6px;overflow:hidden;}
#pbar-fill{height:100%;width:0%;border-radius:6px;}

/* MESSAGES */
#msg{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(22px,5vw,56px);font-weight:900;text-align:center;
  color:#FFD700;
  text-shadow:0 0 0 3px #8B0000,3px 3px 0 #8B0000,-3px 3px 0 #8B0000,3px -3px 0 #8B0000,-3px -3px 0 #8B0000,0 6px 24px rgba(0,0,0,.8);
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;
}
#smash-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s;}

/* GAME OVER */
#gameover{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,0,0,.92) 0%,rgba(0,10,50,.95) 100%);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:all;
}
#gameover h2{font-size:clamp(32px,6vw,72px);color:#FFD700;text-shadow:0 0 28px #FF6B00;margin-bottom:10px;}
.go-sub{font-size:clamp(16px,2.5vw,28px);color:#fff;margin-bottom:6px;}
.go-stats{color:rgba(255,255,255,.5);font-size:clamp(10px,1.6vw,14px);margin-bottom:30px;}
.go-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

#ctrl-hint{
  position:absolute;bottom:5px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.38);font-size:clamp(8px,1.2vw,11px);
  white-space:nowrap;letter-spacing:.5px;
}
#combo-disp{
  position:absolute;top:75px;right:14px;color:#FFD700;font-size:clamp(13px,2vw,22px);
  font-weight:900;text-shadow:0 0 12px rgba(255,215,0,.6);
  opacity:0;transition:opacity .25s;pointer-events:none;text-align:right;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">

<div id="menu">
  <div id="menu-bg-glow"></div>
  <div class="star-field" id="stars"></div>

  <div id="logo-wrap">
    <img id="logo-img"
      src="https://mario.wiki.gallery/images/thumb/7/7b/MTUS_logo.png/400px-MTUS_logo.png"
      onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'"
      alt="Mario Tennis Ultra Smash">
    <div id="logo-fallback" style="display:none;font-size:clamp(32px,6vw,64px);color:#FFD700;text-shadow:4px 4px 0 #8B0000;letter-spacing:2px;">MARIO TENNIS<br><span style="font-size:.6em;color:#fff;">ULTRA SMASH</span></div>
  </div>

  <div class="sec-label">PERSONNAGE</div>
  <div class="char-grid" id="charGrid"></div>

  <div class="sec-label">TERRAIN</div>
  <div class="court-row" id="courtRow"></div>

  <div class="sec-label">DIFFICULTÉ</div>
  <div class="diff-row" id="diffRow">
    <div class="diff-btn sel" data-d="easy">FACILE</div>
    <div class="diff-btn" data-d="normal">NORMAL</div>
    <div class="diff-btn" data-d="hard">DIFFICILE</div>
    <div class="diff-btn" data-d="ultra">ULTRA</div>
  </div>

  <div class="btn-row">
    <button class="mbtn red" id="btnPlay">▶ JOUER</button>
    <button class="mbtn blue" id="btn2P">👥 2 JOUEURS</button>
  </div>
</div>

<div id="hud">
  <div id="scorebox">
    <div class="s-side">
      <div class="s-name" id="n1">MARIO</div>
      <div class="s-pts" id="pt1">0</div>
      <div class="s-info" id="g1">Jeux: 0</div>
      <div class="s-sets" id="set1"></div>
    </div>
    <div class="s-div">VS</div>
    <div class="s-side">
      <div class="s-name" id="n2">CPU</div>
      <div class="s-pts" id="pt2">0</div>
      <div class="s-info" id="g2">Jeux: 0</div>
      <div class="s-sets" id="set2"></div>
    </div>
  </div>
</div>

<div id="pbar-wrap">
  <div id="pbar-label">⚡ PUISSANCE</div>
  <div id="pbar-bg"><div id="pbar-fill"></div></div>
</div>

<div id="msg"></div>
<div id="combo-disp"></div>
<div id="smash-flash"></div>

<div id="gameover">
  <h2 id="go-title">VICTOIRE!</h2>
  <div class="go-sub" id="go-sub"></div>
  <div class="go-stats" id="go-stats"></div>
  <div class="go-btns">
    <button class="mbtn red" id="btnReplay">🔄 REJOUER</button>
    <button class="mbtn blue" id="btnMenu">🏠 MENU</button>
  </div>
</div>

<div id="ctrl-hint">⬆⬇⬅➡ DÉPLACER &nbsp;|&nbsp; [ESPACE] FRAPPER &nbsp;|&nbsp; ESPACE LONG = ULTRA SMASH</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ─── DATA ───────────────────────────────────
const CHARS=[
  {name:"MARIO",   type:"ALL-ROUND", spd:1.0, pw:1.0, ct:1.0,
   img:"https://mario.wiki.gallery/images/thumb/2/29/MTUS_Mario.png/120px-MTUS_Mario.png"},
  {name:"LUIGI",   type:"TECHNIQUE",spd:.93, pw:.9,  ct:1.3,
   img:"https://mario.wiki.gallery/images/thumb/e/ed/MTUS_Luigi.png/120px-MTUS_Luigi.png"},
  {name:"PEACH",   type:"PRÉCISION",spd:.86, pw:.82, ct:1.42,
   img:"https://mario.wiki.gallery/images/thumb/c/c3/MTUS_Peach.png/120px-MTUS_Peach.png"},
  {name:"BOWSER",  type:"PUISSANCE",spd:.72, pw:1.65,ct:.7,
   img:"https://mario.wiki.gallery/images/thumb/9/9a/MTUS_Bowser.png/120px-MTUS_Bowser.png"},
  {name:"TOAD",    type:"VITESSE",  spd:1.45,pw:.74, ct:1.12,
   img:"https://mario.wiki.gallery/images/thumb/4/4b/MTUS_Toad.png/120px-MTUS_Toad.png"},
  {name:"YOSHI",   type:"ALL-ROUND",spd:1.1, pw:.95, ct:1.1,
   img:"https://mario.wiki.gallery/images/thumb/5/5a/MTUS_Yoshi.png/120px-MTUS_Yoshi.png"},
  {name:"WALUIGI", type:"TECHNIQUE",spd:1.05,pw:1.1, ct:1.2,
   img:"https://mario.wiki.gallery/images/thumb/1/1d/MTUS_Waluigi.png/120px-MTUS_Waluigi.png"},
  {name:"WARIO",   type:"PUISSANCE",spd:.78, pw:1.5, ct:.72,
   img:"https://mario.wiki.gallery/images/thumb/e/ef/MTUS_Wario.png/120px-MTUS_Wario.png"},
];

const COURTS=[
  {name:"GAZON",    surf:0x2E7D32, lines:0xFFFFFF, sky:0x5BA8D4, bg:0x3B8F3B, darkSurf:0x1B5E20},
  {name:"TERRE",    surf:0xC1440E, lines:0xFFFFFF, sky:0xD4A0A0, bg:0xA03010, darkSurf:0x8C2B00},
  {name:"DUR",      surf:0x1565C0, lines:0xFFFF00, sky:0x8AAEC8, bg:0x0D3D7A, darkSurf:0x0A3870},
  {name:"GLACE",    surf:0xA5D6F0, lines:0x0077BB, sky:0xB8DCF0, bg:0x5599BB, darkSurf:0x6BBAE0},
  {name:"CHAMPIG.", surf:0xF57F17, lines:0xFFFFFF, sky:0xFFCC80, bg:0xCC6600, darkSurf:0xE65100},
  {name:"SABLE",    surf:0xD4A955, lines:0xAA7722, sky:0xF0D080, bg:0xBB8833, darkSurf:0xC49040},
];

const SL=["0","15","30","40","AD"];

let selChar=0, selCourt=0, diff="easy", twoP=false, running=false;

// ─── STARS ──────────────────────────────────
const starsEl=document.getElementById("stars");
for(let i=0;i<55;i++){
  const s=document.createElement("div");s.className="star-dot";
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*55}%;
    width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;
    animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2.5}s;`;
  starsEl.appendChild(s);
}

// ─── CHAR GRID ──────────────────────────────
const charGrid=document.getElementById("charGrid");
CHARS.forEach((c,i)=>{
  const d=document.createElement("div");d.className="char-card"+(i===0?" sel":"");
  d.innerHTML=`<img src="${c.img}" alt="${c.name}" loading="lazy"><div class="char-name">${c.name}</div><div class="char-type">${c.type}</div>`;
  d.onclick=()=>{selChar=i;document.querySelectorAll(".char-card").forEach((x,j)=>x.classList.toggle("sel",j===i));};
  charGrid.appendChild(d);
});

// ─── COURT ROW ──────────────────────────────
const courtRow=document.getElementById("courtRow");
COURTS.forEach((c,i)=>{
  const b=document.createElement("div");b.className="court-btn"+(i===0?" sel":"");
  b.textContent=c.name;
  b.onclick=()=>{selCourt=i;document.querySelectorAll(".court-btn").forEach((x,j)=>x.classList.toggle("sel",j===i));};
  courtRow.appendChild(b);
});

// ─── DIFF ────────────────────────────────────
document.querySelectorAll(".diff-btn").forEach(b=>{
  b.onclick=()=>{diff=b.dataset.d;document.querySelectorAll(".diff-btn").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");};
});

document.getElementById("btnPlay").onclick=()=>startGame(false);
document.getElementById("btn2P").onclick=()=>startGame(true);
document.getElementById("btnReplay").onclick=()=>startGame(twoP);
document.getElementById("btnMenu").onclick=()=>{
  document.getElementById("gameover").style.display="none";
  document.getElementById("menu").style.display="flex";
  document.getElementById("hud").style.display="none";
  running=false;
};

// ─── THREE SETUP ────────────────────────────
const canvas=document.getElementById("c");
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const scene=new THREE.Scene();
// Camera behind P1 (left side), slightly above, looking at court
// Ultra Smash uses a behind-player diagonal view
const camera=new THREE.PerspectiveCamera(52,W()/H(),.1,400);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:"high-performance"});
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());

window.addEventListener("resize",()=>{
  camera.aspect=W()/H();camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

// Lights
const amb=new THREE.AmbientLight(0xffffff,.5);scene.add(amb);
const sun=new THREE.DirectionalLight(0xFFFAE8,1.35);
sun.position.set(6,20,8);sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-25;sun.shadow.camera.right=25;
sun.shadow.camera.top=25;sun.shadow.camera.bottom=-25;
sun.shadow.camera.far=80;sun.shadow.bias=-.0005;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xADD8FF,.28);
fill.position.set(-4,8,-6);scene.add(fill);

// ─── COURT BUILDER ──────────────────────────
let courtObjs=[];
function clearCourt(){courtObjs.forEach(o=>scene.remove(o));courtObjs=[];}

function buildCourt(ci){
  clearCourt();
  const ct=COURTS[ci];
  scene.background=new THREE.Color(ct.sky);
  scene.fog=new THREE.Fog(ct.sky,55,130);

  // Far ground
  const fg=new THREE.Mesh(new THREE.PlaneGeometry(400,400),new THREE.MeshLambertMaterial({color:ct.bg}));
  fg.rotation.x=-Math.PI/2;fg.position.y=-.02;scene.add(fg);courtObjs.push(fg);

  // Court surface
  // In Ultra Smash: court runs LEFT-RIGHT (x axis), net is in the middle on x=0
  // Player 1 is on LEFT (negative x), Player 2 on RIGHT (positive x)
  // Camera is behind P1 (from -x side, looking +x direction) slightly diagonal
  const surf=new THREE.Mesh(new THREE.PlaneGeometry(26,13),new THREE.MeshLambertMaterial({color:ct.surf}));
  surf.rotation.x=-Math.PI/2;surf.receiveShadow=true;scene.add(surf);courtObjs.push(surf);

  // Service boxes darker
  const sboxMat=new THREE.MeshLambertMaterial({color:ct.darkSurf});
  const sb=new THREE.Mesh(new THREE.PlaneGeometry(7,9),sboxMat);
  sb.rotation.x=-Math.PI/2;sb.position.set(-3.5,.01,0);scene.add(sb);courtObjs.push(sb);
  const sb2=new THREE.Mesh(new THREE.PlaneGeometry(7,9),sboxMat);
  sb2.rotation.x=-Math.PI/2;sb2.position.set(3.5,.01,0);scene.add(sb2);courtObjs.push(sb2);

  // Lines
  const lm=new THREE.MeshBasicMaterial({color:ct.lines,depthWrite:false});
  function L(w,h,x,z,ry=0){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),lm);
    m.rotation.x=-Math.PI/2;if(ry)m.rotation.z=ry;
    m.position.set(x,.025,z);scene.add(m);courtObjs.push(m);
  }
  // Outer bounds
  L(.07,13,-13,0); L(.07,13,13,0);   // side lines
  L(26,.07,0,-6.5); L(26,.07,0,6.5); // baselines
  // Net line (center)
  L(.07,13,0,0);
  // Service boxes
  L(14,.07,0,-4.5); L(14,.07,0,4.5);  // service lines
  L(.07,9,-7,0); L(.07,9,7,0);        // center service line
  // Center marks
  L(.4,.07,-13,0); L(.4,.07,13,0);

  // Net
  const netPoleM=new THREE.MeshLambertMaterial({color:0xDDDDDD});
  for(let s of[-1,1]){
    const p=new THREE.Mesh(new THREE.CylinderGeometry(.065,.065,2.5,8),netPoleM);
    p.position.set(0,1.25,s*6.6);p.castShadow=true;scene.add(p);courtObjs.push(p);
  }
  const netM=new THREE.MeshBasicMaterial({color:0xFFFFFF,wireframe:true,transparent:true,opacity:.8});
  const net=new THREE.Mesh(new THREE.BoxGeometry(.06,1.55,13.2),netM);
  net.position.set(0,.87,0);scene.add(net);courtObjs.push(net);
  const ntm=new THREE.MeshLambertMaterial({color:0xEEEEEE});
  const nt=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,13.2,6),ntm);
  nt.rotation.x=Math.PI/2;nt.position.set(0,1.62,0);scene.add(nt);courtObjs.push(nt);

  // ── STADIUM STANDS ──
  // The MTUS stadium has stands on all 4 sides in the same indoor arena
  // Back wall (far from camera = +x side) — big stand
  const smM=new THREE.MeshLambertMaterial({color:0x4E342E});
  const smDk=new THREE.MeshLambertMaterial({color:0x3E2723});

  // Far stand (behind P2)
  const farS=new THREE.Mesh(new THREE.BoxGeometry(34,6,7),smM);
  farS.position.set(0,3,22);scene.add(farS);courtObjs.push(farS);
  const farF=new THREE.Mesh(new THREE.BoxGeometry(34,.4,7),new THREE.MeshLambertMaterial({color:0x6D4C41}));
  farF.position.set(0,6.2,22);scene.add(farF);courtObjs.push(farF);

  // Near stand (behind P1, partially visible)
  const nearS=new THREE.Mesh(new THREE.BoxGeometry(34,6,7),smM);
  nearS.position.set(0,3,-22);scene.add(nearS);courtObjs.push(nearS);

  // Side stands left & right
  for(let s of[-1,1]){
    const ss=new THREE.Mesh(new THREE.BoxGeometry(7,5,30),smM);
    ss.position.set(s*19,2.5,0);scene.add(ss);courtObjs.push(ss);
  }

  // Crowd (colored spheres on stands)
  const crowdC=[0xFF5252,0x448AFF,0x69F0AE,0xFFFF00,0xFF4081,0xFF9800,0x40C4FF,0xE040FB];
  for(let i=0;i<120;i++){
    const cm=new THREE.MeshBasicMaterial({color:crowdC[i%8]});
    const cr=new THREE.Mesh(new THREE.SphereGeometry(.22,5,4),cm);
    // Distribute in all stands
    let px,py,pz;
    const side=i%4;
    if(side===0){px=(Math.random()-.5)*30;py=3.2+Math.random()*2.8;pz=19.5+Math.random()*4;}
    else if(side===1){px=(Math.random()-.5)*30;py=3.2+Math.random()*2.8;pz=-(19.5+Math.random()*4);}
    else if(side===2){px=16+Math.random()*4;py=2.5+Math.random()*2;pz=(Math.random()-.5)*26;}
    else{px=-(16+Math.random()*4);py=2.5+Math.random()*2;pz=(Math.random()-.5)*26;}
    cr.position.set(px,py,pz);scene.add(cr);courtObjs.push(cr);
  }

  // Arena ceiling / roof structure
  const roofM=new THREE.MeshLambertMaterial({color:0x212121,side:THREE.BackSide});
  const roof=new THREE.Mesh(new THREE.BoxGeometry(70,4,70),roofM);
  roof.position.set(0,18,0);scene.add(roof);courtObjs.push(roof);

  // Ceiling lights
  const lightM=new THREE.MeshBasicMaterial({color:0xFFFDE7});
  for(let lx of[-12,0,12])for(let lz of[-8,8]){
    const lp=new THREE.Mesh(new THREE.BoxGeometry(1.5,.2,3.5),lightM);
    lp.position.set(lx,15.5,lz);scene.add(lp);courtObjs.push(lp);
  }

  // Scoreboard on far wall
  const sbBG=new THREE.Mesh(new THREE.BoxGeometry(10,3,.15),new THREE.MeshLambertMaterial({color:0x111111}));
  sbBG.position.set(0,10,21.9);scene.add(sbBG);courtObjs.push(sbBG);
  const sbFrame=new THREE.Mesh(new THREE.BoxGeometry(10.5,3.5,.1),new THREE.MeshLambertMaterial({color:0xFFD700}));
  sbFrame.position.set(0,10,21.85);scene.add(sbFrame);courtObjs.push(sbFrame);

  // Floor outside court
  const flM=new THREE.MeshLambertMaterial({color:0x5D4037});
  for(let fz of[-1,1]){
    const fl=new THREE.Mesh(new THREE.PlaneGeometry(26,9),flM);
    fl.rotation.x=-Math.PI/2;fl.position.set(0,0,fz*11);scene.add(fl);courtObjs.push(fl);
  }
}

// ─── BILLBOARD SPRITES ──────────────────────
// Characters are rendered as camera-facing sprites using official PNG textures
const texLoader=new THREE.TextureLoader();
const texCache={};

function getOrLoadTex(url,cb){
  if(texCache[url]){cb(texCache[url]);return;}
  texLoader.load(url,t=>{texCache[url]=t;cb(t);},undefined,()=>{
    // fallback: create coloured canvas texture
    const c2=document.createElement("canvas");c2.width=128;c2.height=192;
    const ctx=c2.getContext("2d");
    ctx.fillStyle="#E60026";ctx.fillRect(0,0,128,192);
    ctx.fillStyle="#fff";ctx.font="bold 24px Arial";ctx.textAlign="center";
    ctx.fillText("?",64,100);
    const t2=new THREE.CanvasTexture(c2);texCache[url]=t2;cb(t2);
  });
}

function makeSprite(charIdx,scale=1){
  const c=CHARS[charIdx];
  const group=new THREE.Group();
  // Placeholder mesh while texture loads
  const geo=new THREE.PlaneGeometry(1.1*scale,1.6*scale);
  const mat=new THREE.MeshBasicMaterial({transparent:true,side:THREE.DoubleSide,depthWrite:false,opacity:0});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.y=0.8*scale;
  group.add(mesh);
  group.spriteMesh=mesh;

  getOrLoadTex(c.img,tex=>{
    tex.colorSpace=THREE.SRGBColorSpace;
    mat.map=tex;mat.opacity=1;mat.needsUpdate=true;
  });

  // Shadow
  const shd=new THREE.Mesh(
    new THREE.CircleGeometry(.45*scale,10),
    new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.3,depthWrite:false})
  );
  shd.rotation.x=-Math.PI/2;shd.position.y=.01;
  group.add(shd);group.shadow=shd;
  group.charScale=scale;
  return group;
}

// Ball
function makeBall(){
  const g=new THREE.Group();
  const bm=new THREE.MeshLambertMaterial({color:0xCCEE22});
  const ball=new THREE.Mesh(new THREE.SphereGeometry(.18,14,14),bm);
  ball.castShadow=true;g.add(ball);
  const seamM=new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:.55});
  const s1=new THREE.Mesh(new THREE.TorusGeometry(.175,.011,5,18),seamM);g.add(s1);
  const s2=new THREE.Mesh(new THREE.TorusGeometry(.175,.011,5,18),seamM);
  s2.rotation.y=Math.PI/2;g.add(s2);
  // Shadow
  const shd=new THREE.Mesh(new THREE.CircleGeometry(.18,10),
    new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.28,depthWrite:false}));
  shd.rotation.x=-Math.PI/2;g.shd=shd;scene.add(shd);
  return g;
}

// Trail
let trail=[];const trailMs=[];
function makeTrail(){
  trailMs.forEach(t=>scene.remove(t));trailMs.length=0;trail=[];
  for(let i=0;i<14;i++){
    const t=new THREE.Mesh(new THREE.SphereGeometry(.1-.005*i,5,4),
      new THREE.MeshBasicMaterial({color:0xFFFF00,transparent:true,opacity:0,depthWrite:false}));
    scene.add(t);trailMs.push(t);
  }
}

// ─── GAME STATE ──────────────────────────────
let p1=null,p2=null,ballObj=null;
let p1x=-9.5,p1z=0,p2x=9.5,p2z=0;
let bx=0,by=1.4,bz=0,bvx=0,bvy=0,bvz=0;
let serving=true,srvSide=1,inRally=false;
let p1pts=0,p2pts=0,p1g=0,p2g=0,p1s=0,p2s=0;
let power=0,smash=false,hcool=0;
let bounces=0,rally=0,lastHit=0;
let stats={aces1:0,aces2:0,sm1:0,sm2:0,maxRally:0};

// Camera target
let camTX=0,camTZ=0,camTY=0;

// ─── INPUT ───────────────────────────────────
const K={};
document.addEventListener("keydown",e=>{K[e.code]=true;
  if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code))e.preventDefault();});
document.addEventListener("keyup",e=>{delete K[e.code];});

// ─── START GAME ─────────────────────────────
function startGame(two){
  twoP=two;
  if(p1){scene.remove(p1);if(p1.shd)scene.remove(p1.shd);}
  if(p2){scene.remove(p2);if(p2.shd)scene.remove(p2.shd);}
  if(ballObj){scene.remove(ballObj);if(ballObj.shd)scene.remove(ballObj.shd);}
  trailMs.forEach(t=>scene.remove(t));trailMs.length=0;

  buildCourt(selCourt);

  const p2ci=two?((selChar+1)%CHARS.length):Math.floor(Math.random()*CHARS.length);

  p1=makeSprite(selChar,1);p1.position.set(p1x,0,p1z);scene.add(p1);
  p2=makeSprite(p2ci,1);p2.position.set(p2x,0,p2z);scene.add(p2);
  ballObj=makeBall();scene.add(ballObj);
  makeTrail();

  p1pts=0;p2pts=0;p1g=0;p2g=0;p1s=0;p2s=0;
  p1x=-9.5;p1z=0;p2x=9.5;p2z=0;
  serving=true;srvSide=1;inRally=false;power=0;smash=false;hcool=0;
  bounces=0;rally=0;lastHit=0;
  stats={aces1:0,aces2:0,sm1:0,sm2:0,maxRally:0};

  document.getElementById("menu").style.display="none";
  document.getElementById("gameover").style.display="none";
  document.getElementById("hud").style.display="block";
  document.getElementById("pbar-wrap").style.display="flex";
  document.getElementById("n1").textContent=CHARS[selChar].name;
  document.getElementById("n2").textContent=two?CHARS[p2ci].name:"CPU";
  updHUD();running=true;
  setServe();showMsg("SERVEZ! [ESPACE]",2200);
}

function setServe(){
  bx=srvSide===1?-8:8;by=1.5;bz=0;bvx=0;bvy=0;bvz=0;
  serving=true;inRally=false;power=0;
  if(ballObj)ballObj.position.set(bx,by,bz);
}

// ─── SCORING ────────────────────────────────
function ptWon(w){
  if(w===1)p1pts++;else p2pts++;
  stats.maxRally=Math.max(stats.maxRally,rally);
  // Check ace
  if(rally===0&&((w===1&&lastHit===1)||(w===2&&lastHit===2))){
    if(w===1)stats.aces1++;else stats.aces2++;showMsg("ACE! 🎾",1200);
  }
  if(p1pts>=4&&p2pts>=4){const d=p1pts-p2pts;if(d>=2){gameWon(1);return;}if(d<=-2){gameWon(2);return;}}
  else if(p1pts>=4&&p2pts<3){gameWon(1);return;}
  else if(p2pts>=4&&p1pts<3){gameWon(2);return;}
  updHUD();srvSide=w;
  setTimeout(()=>{setServe();showMsg("SERVEZ!",1500);},1300);
}
function gameWon(w){
  if(w===1)p1g++;else p2g++;p1pts=0;p2pts=0;
  if((w===1&&p1g>=6&&p1g-p2g>=2)||(w===2&&p2g>=6&&p2g-p1g>=2)){setWon(w);return;}
  if(p1g>=7||p2g>=7){setWon(w);return;}
  showMsg(w===1?"JEU "+CHARS[selChar].name+"!":"JEU CPU!",1600);
  updHUD();setTimeout(()=>{setServe();showMsg("SERVEZ!",1500);},1900);
}
function setWon(w){
  if(w===1)p1s++;else p2s++;p1g=0;p2g=0;updHUD();
  if(p1s>=2||p2s>=2){endMatch(w);return;}
  showMsg(w===1?"SET GAGNÉ! 🏆":"SET PERDU...",2200);
  setTimeout(()=>{setServe();showMsg("NOUVEAU SET!",1800);},2600);
}
function endMatch(w){
  running=false;
  document.getElementById("gameover").style.display="flex";
  document.getElementById("go-title").textContent=w===1?"VICTOIRE! 🏆":"DÉFAITE...";
  document.getElementById("go-sub").textContent=`${p1s} - ${p2s} sets`;
  document.getElementById("go-stats").textContent=`Aces: ${stats.aces1} | Smashes: ${stats.sm1} | Rally max: ${stats.maxRally}`;
  document.getElementById("pbar-wrap").style.display="none";
}
function updHUD(){
  let l1,l2;
  if(p1pts>=4&&p2pts>=4){l1=p1pts>p2pts?"AD":"40";l2=p2pts>p1pts?"AD":"40";}
  else{l1=SL[Math.min(p1pts,4)];l2=SL[Math.min(p2pts,4)];}
  document.getElementById("pt1").textContent=l1;
  document.getElementById("pt2").textContent=l2;
  document.getElementById("g1").textContent="Jeux: "+p1g;
  document.getElementById("g2").textContent="Jeux: "+p2g;
  const s1=document.getElementById("set1"),s2=document.getElementById("set2");
  s1.innerHTML="";s2.innerHTML="";
  for(let i=0;i<2;i++){
    const d1=document.createElement("div");d1.className="s-pip"+(i<p1s?" w":"");s1.appendChild(d1);
    const d2=document.createElement("div");d2.className="s-pip"+(i<p2s?" w":"");s2.appendChild(d2);
  }
}

// ─── EFFECTS ────────────────────────────────
let msgTimer=null;
function showMsg(t,d=2000){
  const m=document.getElementById("msg");
  m.textContent=t;m.style.opacity="1";
  clearTimeout(msgTimer);msgTimer=setTimeout(()=>m.style.opacity="0",d);
}
function smashFX(ultra){
  const f=document.getElementById("smash-flash");
  f.style.transition="none";f.style.opacity=ultra?.85:.45;
  requestAnimationFrame(()=>{f.style.transition="opacity .15s";f.style.opacity="0";});
  showMsg(ultra?"⚡ ULTRA SMASH! ⚡":"💥 SMASH!",900);
  if(ultra){if(twoP?false:true)stats.sm1++;}
}
function showCombo(n){
  if(n<3)return;
  const c=document.getElementById("combo-disp");
  c.textContent=`🔥 x${n}`;c.style.opacity="1";
  clearTimeout(c._t);c._t=setTimeout(()=>c.style.opacity="0",1200);
}
function updPbar(){
  const f=document.getElementById("pbar-fill");
  f.style.width=(power*100)+"%";
  f.style.background=power>.8?"linear-gradient(90deg,#FF2200,#FFD700)":power>.5?"linear-gradient(90deg,#FF8800,#FFEE00)":"linear-gradient(90deg,#22CC44,#88FF44)";
}

// ─── AI ──────────────────────────────────────
function getAI(){
  return{
    easy:  {spd:.045,react:.28,err:.42,smash:.08},
    normal:{spd:.09, react:.16,err:.2, smash:.3},
    hard:  {spd:.135,react:.07,err:.07,smash:.58},
    ultra: {spd:.19, react:.02,err:.01,smash:.92},
  }[diff]||{spd:.09,react:.16,err:.2,smash:.3};
}
function aiHit(){
  const ai=getAI();const c=CHARS[p2?p2.charIdx||1:1];
  const isSm=Math.random()<ai.smash&&by>1.8&&rally>1;
  const isU=isSm&&Math.random()<.3&&by>2.2;
  const err=(Math.random()-.5)*ai.err*5;
  const pw=(.26+Math.random()*.09);
  bvx=-(pw+(isSm?.22:0)+(isU?.15:0));
  bvy=isU?.03:isSm?.07:.17+Math.random()*.06;
  bvz=(p1z+err-bz)*.07;
  lastHit=2;hcool=7;bounces=0;rally++;stats.maxRally=Math.max(stats.maxRally,rally);
  if(isSm){stats.sm2++;smashFX(isU);}
  swingSprite(p2,false);
}

// ─── SPRITE FACING ──────────────────────────
function faceCamera(spr){
  if(!spr||!spr.spriteMesh)return;
  spr.spriteMesh.rotation.y=Math.atan2(
    camera.position.x-spr.position.x,
    camera.position.z-spr.position.z
  );
}
function swingSprite(spr,isLeft){
  if(!spr||!spr.spriteMesh)return;
  const sm=spr.spriteMesh;
  const orig=sm.rotation.z||0;
  sm.rotation.z=isLeft?.4:-.4;
  let f=0;function rb(){sm.rotation.z+=(orig-sm.rotation.z)*.2;if(f++<20)requestAnimationFrame(rb);}rb();
}

// ─── CAMERA SETUP ───────────────────────────
// Position: behind P1 (left side), up and back
// Angle: looking toward the net and court, like the real game
camera.position.set(-18,10,0);
camera.lookAt(0,1,0);
let cTX=-18,cTY=10,cTZ=0;

// ─── MAIN LOOP ───────────────────────────────
let t0=performance.now();
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-(t0||t))/16.67,3);t0=t;
  if(!running){renderer.render(scene,camera);return;}

  const ai=getAI();
  const ch=CHARS[selChar];

  // ── P1 MOVE ──
  const sp1=ch.spd*.18;
  if(K["ArrowUp"]||K["KeyW"])   p1z-=sp1*dt;
  if(K["ArrowDown"]||K["KeyS"]) p1z+=sp1*dt;
  if(K["ArrowLeft"]||K["KeyA"]) p1x=Math.max(-12.5,p1x-sp1*dt);
  if(K["ArrowRight"]||K["KeyD"])p1x=Math.min(-1,p1x+sp1*dt);
  p1z=Math.max(-6,Math.min(6,p1z));
  p1.position.set(p1x,0,p1z);

  // ── P2 MOVE ──
  if(twoP){
    const sp2=CHARS[p2.charIdx||1].spd*.18;
    if(K["KeyI"])p2z-=sp2*dt; if(K["KeyK"])p2z+=sp2*dt;
    if(K["KeyJ"])p2x=Math.max(1,p2x-sp2*dt); if(K["KeyL"])p2x=Math.min(12.5,p2x+sp2*dt);
    p2z=Math.max(-6,Math.min(6,p2z));
  }else if(inRally){
    p2z+=(bz+(Math.random()-.5)*ai.err*2.8-p2z)*ai.react*dt;
    if(bvx>0&&bx>0)p2x+=(Math.min(12,bx+.8)-p2x)*ai.spd*dt;
    p2x=Math.max(1,Math.min(12.5,p2x));
    p2z=Math.max(-6,Math.min(6,p2z));
  }
  p2.position.set(p2x,0,p2z);

  // Face camera
  faceCamera(p1);faceCamera(p2);

  // ── SERVE ──
  if(serving){
    const sx=srvSide===1?p1x:p2x, sz=srvSide===1?p1z:p2z;
    ballObj.position.set(sx,1.5+Math.sin(t/280)*.2,sz);
    ballObj.shd.position.set(sx,.015,sz);ballObj.shd.scale.setScalar(.5);

    if(K["Space"]&&srvSide===1){power=Math.min(power+.05*dt*ch.pw,1);updPbar();}
    else if(power>.015){
      const pw=.22+power*.38*ch.pw;
      bvx=pw;bvy=.18;bvz=(p2z-p1z)*.055+(Math.random()-.5)*.04;
      bx=p1x;by=1.5;bz=p1z;
      serving=false;inRally=true;lastHit=1;power=0;bounces=0;rally=0;updPbar();
    }
    // AI serve
    if(!twoP&&srvSide===-1){
      power=Math.min(power+.06*dt,1);
      if(power>=.55+Math.random()*.3){
        bvx=-(0.26+power*.18);bvy=.17;bvz=(p1z-p2z)*.05+(Math.random()-.5)*.08;
        bx=p2x;by=1.5;bz=p2z;
        serving=false;inRally=true;lastHit=2;power=0;bounces=0;rally=0;
      }
    }
  }

  // ── RALLY ──
  if(inRally){
    if(K["Space"])power=Math.min(power+.055*dt,1);
    else power=Math.max(power-.04*dt,0);
    smash=power>.76;updPbar();

    bx+=bvx*dt; by+=bvy*dt; bz+=bvz*dt;
    bvy-=.028*dt;
    bvx*=Math.pow(.9995,dt);bvz*=Math.pow(.9995,dt);

    // Ground
    if(by<=.18){
      by=.18;
      if(Math.abs(bvy)>.04){bvy*=-.6;bvx*=.92;bvz*=.9;bounces++;}
      else{bvy=0;bvx*=.5;if(bx<0)ptWon(2);else ptWon(1);return;}
      if(bounces>=2){if(bx<0)ptWon(2);else ptWon(1);return;}
    }
    // Side walls
    if(Math.abs(bz)>6.6){bvz*=-.85;bz=Math.sign(bz)*6.5;}
    // Net
    if(bx>-.2&&bx<.2&&by<1.68&&by>.1){bvx*=-.45;bvy=Math.abs(bvy)*.35+.12;by=1.69;}
    // OOB
    if(bx<-14){ptWon(2);return;}if(bx>14){ptWon(1);return;}

    // P1 hit
    const hr1=1.25;
    if(hcool<=0&&bvx<0&&bx<p1x+hr1&&bx>p1x-.6&&Math.abs(bz-p1z)<hr1&&by<2.7&&by>.05){
      const isSm=power>.72,isU=power>.88;
      const pw=(.26+power*.32)*ch.pw;
      bvx=pw+(isSm?.22:0)+(isU?.15:0);
      bvy=isU?.02:isSm?.07:.19+power*.05;
      bvz=(p2z+(Math.random()-.5)*2.8*(1.5-ch.ct)-bz)*.07;
      lastHit=1;hcool=7;bounces=0;rally++;
      showCombo(rally);
      if(isSm){stats.sm1++;smashFX(isU);}
      power=0;smash=false;swingSprite(p1,true);
    }
    // P2 hit
    const hr2=1.25;
    if(hcool<=0&&bvx>0&&bx>p2x-hr2&&bx<p2x+.6&&Math.abs(bz-p2z)<hr2&&by<2.7&&by>.05){
      if(twoP){
        const isSm=K["Enter"]&&power>.6;
        bvx=-(.26+(isSm?.2:0));bvy=isSm?.07:.18;bvz=(bz-p2z)*.1+(Math.random()-.5)*.04;
        lastHit=2;hcool=7;bounces=0;rally++;if(isSm)smashFX(false);swingSprite(p2,false);
      }else aiHit();
    }
    if(hcool>0)hcool-=dt;

    ballObj.position.set(bx,by,bz);
    ballObj.shd.position.set(bx,.015,bz);
    ballObj.shd.scale.setScalar(Math.max(.1,.8-Math.max(0,by-.18)*.14));
    ballObj.rotation.x+=bvx*.45*dt;ballObj.rotation.z+=bvz*.25*dt;

    // Trail
    const spd=Math.abs(bvx)+Math.abs(bvz);
    trail.unshift({x:bx,y:by,z:bz});
    if(trail.length>trailMs.length)trail.pop();
    trailMs.forEach((tm,i)=>{
      if(trail[i]){
        tm.position.set(trail[i].x,trail[i].y,trail[i].z);tm.visible=true;
        tm.material.opacity=(trailMs.length-i)/(trailMs.length*2.8)*Math.min(spd/.35,1);
        tm.material.color.setHex(smash?0xFF4400:0xCCFF00);
      }else tm.visible=false;
    });
  }

  // ── CAMERA — behind-P1 diagonal, like Ultra Smash ──
  // Keep camera to the left and behind P1, higher than court, looking right toward net
  const tgCX=p1x-8;
  const tgCY=9+Math.abs(bz)*.08;
  const tgCZ=p1z*.35+bz*.12;
  cTX+=(tgCX-cTX)*.025;cTY+=(tgCY-cTY)*.02;cTZ+=(tgCZ-cTZ)*.025;
  camera.position.set(cTX,cTY,cTZ);
  camera.lookAt(bx*.1+2,1.5+by*.08,bz*.06);

  renderer.render(scene,camera);
}
loop(performance.now());
</script>
</body>
</html>
